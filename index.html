<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Site Unavailable</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0a0d14;
    color: #f4f1ea;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
  }
  .box { max-width: 560px; }
  h1 {
    font-size: 14px;
    letter-spacing: 6px;
    margin: 0 0 28px;
    opacity: 0.55;
    font-weight: 700;
    text-transform: uppercase;
  }
  p {
    line-height: 1.7;
    margin: 0 0 16px;
    opacity: 0.88;
    font-size: 15px;
  }
  a {
    color: #ffb02e;
    text-decoration: none;
    border-bottom: 1px solid rgba(255, 176, 46, 0.35);
    padding-bottom: 1px;
  }
  a:hover { border-bottom-color: #ffb02e; }
  .signature {
    margin-top: 36px;
    opacity: 0.45;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
<script>
  // Service worker cleanup. If a user previously visited and the SW cached
  // any game assets locally, this unregisters that SW and clears the cache
  // so nothing remains on their device.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
    });
    if (window.caches && caches.keys) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }
  }
</script>
</head>
<body>
  <div class="box">
    <h1>Site Unavailable</h1>
    <p>The fan project that lived at this URL has been taken offline at the request of the rights holder.</p>
    <p>Thank you to everyone who played, shared, and supported it during its short run.</p>
    <p class="signature">Created by <a href="https://x.com/ikevinadams">@ikevinadams</a></p>
  </div>
</body>
</html>
